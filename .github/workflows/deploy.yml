name: Auto Deploy Nexflare Frontend

# Trigger every time you push to main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up your SSH key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      # 3️⃣ Run deployment commands via SSH
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no jhoriz@157.230.248.185 << 'EOF'
            cd ./nexflare/frontend/
            git pull origin main
            sudo docker compose up -d --build
            sudo systemctl restart nginx
          EOF